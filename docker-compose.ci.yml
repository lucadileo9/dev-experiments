# Secondo Docker Compose, con MySQL e un container di test basato su Python Slim.

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    # PyMySQL supporta SHA2, ma per coerenza con la CI manteniamo il flag
    # command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: blog
      MYSQL_ROOT_PASSWORD: ci_root_pass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pci_root_pass"]
      interval: 2s
      timeout: 5s
      retries: 30

  test:
    # VANTAGGIO: Torniamo all'immagine slim!
    image: python:3.10-slim
    
    working_dir: /app
    volumes:
      - .:/app
    
    environment:
      # Fondamentale: deve puntare al file con il monkey-patching
      DJANGO_SETTINGS_MODULE: django_project.production_settings
      DJANGO_SECRET_KEY: ci-test-key
      MYSQL_USER: root
      MYSQL_PASSWORD: ci_root_pass
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: blog
      
    depends_on:
      mysql:
        condition: service_healthy
    # COMANDO:
    # 1. Installiamo 'gcc' SOLO per compilare uWSGI (presente nei requirements).
    # 2. NON installiamo 'libmysqlclient-dev' (la prova del nove che PyMySQL funziona).
    command: >
      bash -c "
        apt-get update && 
        apt-get install -y gcc python3-dev &&
        
        pip install --upgrade pip &&
        pip install -r requirements.txt &&
        pip install coverage &&
        pip install cryptography &&  # Per risolvere un errore di importazione di PyMySQL
        # Per la sintassi di YAML lasciare questa riga vuota evita che il resto del comando venga interpretato come parte del comando precedente

        

        python manage.py migrate --noinput &&
        coverage run --source='.' manage.py test accounts articles pages --verbosity=2 &&
        coverage report
      "





# Questo "script" Python è un modo semplice per aspettare che MySQL sia pronto prima di eseguire i test.
# Non è necessario nel docker compose perché usiamo 'depends_on' con 'condition: service_healthy', 
